<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Capítulos</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>Gerenciador de Capítulos</h1>
        <p class="app-subtitle">Baixe ou unifique capítulos de web novels de forma automatizada</p>
      </header>

      <div class="action-tabs">
        <button type="button" class="tab-button active" data-value="txt" onclick="alterarModo('txt')">
          <span class="tab-icon">📄</span> TXT Individual
        </button>
        <button type="button" class="tab-button" data-value="zip" onclick="alterarModo('zip')">
          <span class="tab-icon">📦</span> Pacote ZIP
        </button>
        <button type="button" class="tab-button" data-value="unificar" onclick="alterarModo('unificar')">
          <span class="tab-icon">✨</span> Unificar Pasta
        </button>
      </div>

      <form id="formDownload" class="main-form">
        <input type="radio" name="formato" id="radioTxt" value="txt" checked style="display:none;" />
        <input type="radio" name="formato" id="radioZip" value="zip" style="display:none;" />
        <input type="radio" name="formato" id="radioUnificar" value="unificar" style="display:none;" />

        <div class="form-section">
          <label class="field-label" for="caminhoDestino">📁 Pasta de Trabalho</label>
          <div class="folder-picker-group">
            <input
              type="text"
              id="caminhoDestino"
              name="caminhoDestino"
              readonly
              placeholder="Clique em 'Selecionar' para definir o diretório..."
              required
            />
            <button type="button" id="btnSelecionarPasta" class="btn-secondary">Selecionar</button>
          </div>
        </div>

        <div id="sectionParametrosDownload" class="form-section">
          <div class="field-wrapper">
            <label class="field-label" for="url">Link Base da Fonte</label>
            <input
              type="text"
              id="url"
              name="url"
              value="https://centralnovel.com/shadow-slave-capitulo-"
              required
            />
          </div>
          
          <div class="grid-2-col">
            <div class="field-wrapper">
              <label class="field-label" for="capituloInicial">Capítulo Inicial</label>
              <input type="number" id="capituloInicial" name="capituloInicial" min="1" required />
            </div>
            <div class="field-wrapper">
              <label class="field-label" for="capituloFinal">Capítulo Final</label>
              <input type="number" id="capituloFinal" name="capituloFinal" min="1" required />
            </div>
          </div>
        </div>

        <div id="sectionNomeArquivo" class="form-section" style="display: none;">
          <div class="field-wrapper">
            <label class="field-label" id="labelNomeArquivo" for="nomeArquivo">Nome do Arquivo Final</label>
            <input
              type="text"
              id="nomeArquivo"
              name="nomeArquivo"
              placeholder="Ex: volume_01"
            />
          </div>
        </div>

        <button type="submit" id="btnPrincipal" class="btn-primary">Baixar Capítulos</button>
      </form>

      <div id="unifierStatus" class="status-panel"></div>
      <div id="linkDownload" class="status-panel text-center"></div>

      <div id="stats" class="progress-card" style="display: none;">
        <div class="progress-card-header" onclick="toggleProgressLog()">
          <div class="progress-meta">
            <span id="progressToggle" class="toggle-arrow">▼</span>
            <span id="progressTitle" class="progress-title">Progresso do Processo</span>
          </div>
          <span id="progressPercentage" class="progress-badge">0%</span>
        </div>
        
        <div class="progress-track">
          <div id="progressBar" class="progress-fill"></div>
        </div>
        
        <div id="statsSummary" class="progress-summary"></div>

        <div id="progressLogContainer" class="progress-log-wrapper collapsed">
          <div id="progresso" class="log-list"></div>
        </div>
      </div>

      <footer class="app-footer">
        <div class="dev-panel">
          <details class="dev-details">
            <summary class="dev-summary">⚙️ Ajustes de Rede Avançados</summary>
            <div class="dev-grid">
              <div class="field-wrapper">
                <label class="dev-label" for="maxConcurrent">Concorrência máxima (Threads)</label>
                <input type="number" id="maxConcurrent" min="1" max="50" onchange="saveDevSettings()" />
              </div>
              <div class="field-wrapper">
                <label class="dev-label" for="timeout">Timeout da Requisição (s)</label>
                <input type="number" id="timeout" min="5" max="120" onchange="saveDevSettings()" />
              </div>
              <div class="field-wrapper">
                <label class="dev-label" for="minDelay">Espera Mínima (s)</label>
                <input type="number" id="minDelay" min="0" max="10" step="0.5" onchange="saveDevSettings()" />
              </div>
              <div class="field-wrapper">
                <label class="dev-label" for="maxDelay">Espera Máxima (s)</label>
                <input type="number" id="maxDelay" min="0" max="10" step="0.5" onchange="saveDevSettings()" />
              </div>
            </div>
          </details>
        </div>
      </footer>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script type="text/javascript" src="./script.js"></script>
  </body>
</html>
