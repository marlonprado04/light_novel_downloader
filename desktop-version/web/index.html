<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Download de Capítulos</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Download de Capítulos</h1>
      <form id="formDownload">
        <div class="field">
          <label for="url">URL Base:</label>
          <input
            type="text"
            id="url"
            name="url"
            value="https://centralnovel.com/shadow-slave-capitulo-"
            required
          />
        </div>
        <div class="field">
          <label for="capituloInicial">Capítulo Inicial:</label>
          <input
            type="number"
            id="capituloInicial"
            name="capituloInicial"
            required
          />
        </div>

        <div class="field">
          <label for="capituloFinal">Capítulo Final:</label>
          <input
            type="number"
            id="capituloFinal"
            name="capituloFinal"
            required
          />
        </div>

        <div class="form-section">
          <label class="section-title">📦 Formato de Saída:</label>
          <div class="radio-group">
            <div class="radio-item">
              <label class="radio-option">
                <input type="radio" name="formato" value="zip" onchange="toggleFilenameField()" />
                <span class="radio-label">ZIP (arquivo único)</span>
              </label>
              <div class="field zip-only-field" id="filenameField">
                <input
                  type="text"
                  id="nomeArquivo"
                  name="nomeArquivo"
                  placeholder="Nome do arquivo (opcional)"
                />
              </div>
            </div>
            <label class="radio-option">
              <input type="radio" name="formato" value="txt" checked onchange="toggleFilenameField()" />
              <span class="radio-label">TXT (pasta com arquivos)</span>
            </label>
          </div>
        </div>

        <button type="submit">Baixar</button>
      </form>

      <!-- Progress Bar e Stats no Topo -->
      <div id="stats" style="display: none;">
        <div class="progress-header" id="progressHeader">
          <div class="progress-title">
            <span class="progress-toggle" id="progressToggle">▼</span>
            <span id="progressTitle">📊 Progresso do Download</span>
          </div>
          <div class="progress-percentage" id="progressPercentage">0%</div>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="stats-summary" id="statsSummary"></div>

        <!-- Tabela de Progresso com toggle -->
        <div class="progress-log-container" id="progressLogContainer">
          <ul id="progresso"></ul>
        </div>
      </div>

      <!-- Botão Unificador (aparece após download TXT) -->
      <div id="unifierContainer" style="display: none;">
        <button type="button" id="unifierBtn" class="unifier-btn">📄 Unificar TXT</button>
        <div id="unifierStatus"></div>
      </div>

      <div id="linkDownload"></div>

      <!-- Developer Panel -->
      <div class="dev-panel">
        <div class="dev-header" onclick="toggleDevPanel()">
          <span>⚙️ Opções Avançadas</span>
          <span class="dev-toggle">▼</span>
        </div>
        <div class="dev-content" id="devContent">
          <div class="dev-section-title">Configurações de Download:</div>
          <div class="settings-grid">
            <div class="field">
              <label for="maxConcurrent">
                <strong>Downloads Simultâneos</strong>
                <span class="info-icon" data-tooltip="Mais threads = mais downloads de caps simultaneo por sessão, mas risco de bloqueio. Valores seguros: 5-10. Perigoso: >10">ℹ️</span>
                <span class="hint">(1-50)</span>
              </label>
              <input type="number" id="maxConcurrent" min="1" max="50" value="10" onchange="saveDevSettings()" />
            </div>
            <div class="field">
              <label for="timeout">
                <strong>Timeout</strong>
                <span class="info-icon" data-tooltip="Tempo máximo para aguardar resposta de cada requisição. Valor seguro: 10 segundos.">ℹ️</span>
                <span class="hint">(segundos)</span>
              </label>
              <input type="number" id="timeout" min="5" max="120" value="10" onchange="saveDevSettings()" />
            </div>
            <div class="field">
              <label for="minDelay">
                <strong>Delay Mínimo</strong>
                <span class="info-icon" data-tooltip="Limite mínimo para variação aleatória do delay de download. Usado para parecer mais natural. Valore seguro: 2.0 segundos.">ℹ️</span>
                <span class="hint">(segundos)</span>
              </label>
              <input type="number" id="minDelay" min="0" max="10" step="0.5" value="2.0" onchange="saveDevSettings()" />
            </div>
            <div class="field">
              <label for="maxDelay">
                <strong>Delay Máximo</strong>
                <span class="info-icon" data-tooltip="Limite superior para variação aleatória do delay. Usado para parecer mais natural. Valor seguro: 5.0 segundos.">ℹ️</span>
                <span class="hint">(segundos)</span>
              </label>
              <input type="number" id="maxDelay" min="0" max="10" step="0.5" value="5.0" onchange="saveDevSettings()" />
            </div>
          </div>
          <div class="settings-notice">
            💡 As alterações são salvas automaticamente e aplicadas no próximo download
          </div>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="/eel.js"></script>
    <script type="text/javascript" src="./script.js"></script>
  </body>
</html>
